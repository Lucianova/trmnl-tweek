# TRMNLP configuration
# {{ env.VARIABLE }} interpolation is available here
---
watch:
  - .trmnlp.yml
  - src

# Disable transform so mock variables below are used for local UI preview.
# Remove this line (or set to 'enabled') to test with real Tweek API calls.
transform_runtime: disabled

# Test values for custom form fields (used during local development only)
custom_fields:
  refresh_token: "your_refresh_token_here"
  calendar_name: "My calendar"
  week_start_day: "Monday"
  time_format: "12h"

# Mock the {{ trmnl }} global for local preview
variables:
  trmnl:
    user:
      name: "Johnathan Lewis"
      time_zone: "Buenos Aires"
      time_zone_iana: "America/Argentina/Buenos_Aires"
      utc_offset: -10800
    device:
      height: 480
      width: 800
    system:
      timestamp_utc: 1779848000
    plugin_settings:
